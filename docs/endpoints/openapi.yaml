{
  "openapi": "3.0.3",
  "info": {
    "title": "EduBridgeBackend API",
    "version": "1.0.0"
  },
  "servers": [
    {
      "url": "http://127.0.0.1:8000"
    }
  ],
  "components": {
    "securitySchemes": {
      "sanctum": {
        "type": "http",
        "scheme": "bearer",
        "bearerFormat": "Opaque Sanctum Token"
      }
    },
    "schemas": {
      "RegisterRequest": {
        "type": "object",
        "required": [
          "correo_institucional",
          "nombre_completo",
          "rol",
          "password",
          "password_confirmation"
        ],
        "properties": {
          "external_user_ref": {
            "type": "string",
            "description": "Opcional. Si no se envía se usa el correo institucional."
          },
          "codigo_universitario": {
            "type": "string",
            "nullable": true
          },
          "correo_institucional": {
            "type": "string",
            "format": "email"
          },
          "nombre_completo": {
            "type": "string"
          },
          "rol": {
            "type": "string",
            "enum": [
              "ESTUDIANTE",
              "AUXILIAR",
              "COORDINADOR",
              "ADMINISTRADOR"
            ]
          },
          "password": {
            "type": "string",
            "format": "password"
          },
          "password_confirmation": {
            "type": "string",
            "format": "password"
          }
        },
        "example": {
          "correo_institucional": "estudiante.demo@edu.bo",
          "nombre_completo": "Estudiante Demo",
          "rol": "ESTUDIANTE",
          "password": "Password123!",
          "password_confirmation": "Password123!"
        }
      }
    }
  },
  "paths": {
    "/api/v1/catalogos/estados": {
      "get": {
        "summary": "Catálogos de estados",
        "tags": [
          "Catalogos"
        ],
        "responses": {
          "200": {
            "description": "OK"
          }
        }
      }
    },
    "/api/v1/auth/register": {
      "post": {
        "summary": "Registrar cuenta interna",
        "tags": [
          "Auth"
        ],
        "responses": {
          "201": {
            "description": "Cuenta creada y token emitido"
          },
          "422": {
            "description": "Datos inválidos o rol no permitido"
          }
        },
        "description": "Crea usuario, cuenta y rol inicial en la base local. No consulta directorio externo de usuarios.",
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/RegisterRequest"
              }
            }
          }
        }
      }
    },
    "/api/v1/auth/login": {
      "post": {
        "summary": "Iniciar sesión",
        "tags": [
          "Auth"
        ],
        "responses": {
          "200": {
